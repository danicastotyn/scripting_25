<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MadLib</title>

    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- My CSS -->
    <link rel="stylesheet" href="css/build.css">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>



    <!----------------------------- Header -------------------------------------------->
<header class="bg-main">
    <div class="container">
        <div class="row customHeight justify-content-center align-items-center text-center">
            <div class="col-sm-6 text-white">
                <h1 class="display-1">MabLib</h1>
                <p class="fs-3">Make your own wacky story</p>
            </div>
        </div>
    </div>
</header>
    <!---------------------Opening----------------------->
<section class="py-5 text-white text-center" style="background-color: #232124;">
    <div class="container">
        <h2>Instructions</h2>
        <p class="lead">Add your words to create your own very unique story! Have fun!</p>
    </div>
</section>

<!------------------------Java---------------------------->

<body>
    <section class="container my-5">
        <h2>Fill in the words:</h2>
        <form id="madlib-form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label for="place">Place:</label>
                <input type="text" id="place" required>
            </div>

            <div class="form-group">
                <label for="noun">Noun:</label>
                <input type="text" id="noun" required>
            </div>

            <div class="form-group">
                <label for="verb">Verb:</label>
                <input type="text" id="verb" required>
            </div>

            <div class="form-group">
                <label for="adjective">Adjective:</label>
                <input type="text" id="adjective" required>
            </div>

            <div class="form-group">
                <label for="adverb">Adverb:</label>
                <input type="text" id="adverb" required>
            </div>

            <button type="submit">Generate Story</button>
        </form>
    </section>

    <section class="container my-5">
        <h2>Your Wacky Story:</h2>
        <p id="story-output"></p>
    </section>

    <script src="js/build.js"></script>

</body>
</html>
